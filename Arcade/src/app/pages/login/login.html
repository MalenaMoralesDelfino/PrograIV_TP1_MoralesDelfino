<div class="container mt-5 d-flex justify-content-center">
  <div class="card shadow border-0">
    <div class="card-body p-4" style="width: 500px;">
      <h1 class="text-center mb-4">INICIAR SESIÓN</h1>
      <form (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control fs-4" placeholder="usuario@ejemplo.com" [ngModel]="email()" name="email"
            (ngModelChange)="email.set($event)" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control fs-4" placeholder="••••••••" [ngModel]="password()" name="password"
            (ngModelChange)="password.set($event)" required>
        </div>

        @if (mensajeError()) {
        <div class="alert alert-danger fs-4" role="alert">
          {{ mensajeError() }}
        </div>
        }
        <button type="submit" class="btn btn-dark w-100 mb-3 fs-4" [disabled]="cargando()">
          @if (cargando()) {
          <span>Cargando...</span>
          } @else {
          <span>Entrar</span>
          }
        </button>

        <div class="text-center fs-5 pt-4">
          <small>¿No tenés cuenta? <a routerLink="/registro" class="text-black text-bold">Registrate acá</a></small>
        </div>
      </form>
    </div>
    <div class="mt-5 d-flex gap-2 justify-content-center">
      @for (acceso of accesoRapido(); track acceso.label) {
      <button type="button" class="btn btn-secondary btn-sm w-25 m-2" (click)="completarAccesoRapido(acceso)">
        {{ acceso.label }}
      </button>
      }
    </div>
  </div>
</div>
